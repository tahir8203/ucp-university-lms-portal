<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d5ea8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="University LMS" />
  <title>LMS Certificate</title>
  <link rel="manifest" href="./app.webmanifest" />
  <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <main class="certificate" id="certificateView">
    <h1>Certificate of Completion</h1>
    <p>This certifies that</p>
    <h2 id="certStudent">-</h2>
    <p>has successfully completed class</p>
    <h3 id="certClass">-</h3>
    <p>Issued on <span id="certDate">-</span></p>
    <p id="certCode"></p>
    <button type="button" onclick="window.print()">Print / Save as PDF</button>
  </main>
  <script type="module" src="./js/certificate.js"></script>
  <script src="./js/pwa.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
